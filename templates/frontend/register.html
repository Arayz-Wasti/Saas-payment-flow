<!DOCTYPE html>
{% load static %}
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Register - SaaS Payment</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="{% static 'frontend/css/style.css' %}">
    <script src="{% static 'frontend/js/api.js' %}"></script>
    <script src="{% static 'frontend/js/app.js' %}"></script>
</head>

<body>
    <header>
        <div class="container nav-wrap">
            <a href="/" class="logo">SaaSFlow.</a>
        </div>
    </header>

    <main class="auth-wrapper container">
        <div class="auth-card glass-card">
            <h1 class="auth-title">Create an account</h1>
            <p class="auth-subtitle">Start your 7-day free trial</p>

            <div id="alert-error" class="alert alert-error"></div>

            <form id="register-form">
                <div class="form-group">
                    <label for="company" class="form-label">Company Name</label>
                    <input type="text" id="company" class="form-control" placeholder="Acme Corp" required>
                </div>
                <div class="form-group">
                    <label for="email" class="form-label">Email Address</label>
                    <input type="email" id="email" class="form-control" placeholder="you@example.com" required>
                </div>
                <div class="form-group">
                    <label for="password" class="form-label">Password</label>
                    <input type="password" id="password" class="form-control" placeholder="••••••••" required>
                </div>

                <button type="submit" id="btn-submit" class="btn btn-primary btn-block" style="margin-top: 1rem;">Create
                    Account</button>
            </form>

            <div class="auth-footer">
                Already have an account? <a href="/login/" id="link-login">Log in</a>
            </div>
        </div>
    </main>

    <script>
        // Preserve redirect/checkout context
        document.addEventListener('DOMContentLoaded', () => {
            const urlParams = new URLSearchParams(window.location.search);
            const redirect = urlParams.get('redirect');
            const checkout = urlParams.get('checkout');
            const logLink = document.getElementById('link-login');
            if (logLink && (redirect || checkout)) {
                const params = new URLSearchParams();
                if (redirect) params.set('redirect', redirect);
                if (checkout) params.set('checkout', checkout);
                logLink.href = `/login/?${params.toString()}`;
            }
        });

        document.getElementById('register-form').addEventListener('submit', async (e) => {
            e.preventDefault();

            const company = document.getElementById('company').value;
            const email = document.getElementById('email').value;
            const password = document.getElementById('password').value;
            const btn = document.getElementById('btn-submit');

            document.getElementById('alert-error').style.display = 'none';
            setButtonLoading(btn, true, 'Creating account...');

            try {
                // Register
                await window.api.register(email, password, company);

                // Success! Redirect with preserved params
                const urlParams = new URLSearchParams(window.location.search);
                const redirect = urlParams.get('redirect');
                const checkout = urlParams.get('checkout');
                let loginUrl = '/login/?registered=true';
                if (redirect) loginUrl += `&redirect=${encodeURIComponent(redirect)}`;
                if (checkout) loginUrl += `&checkout=${encodeURIComponent(checkout)}`;
                window.location.href = loginUrl;

            } catch (err) {
                console.error('Registration failed:', err);
                document.getElementById('alert-error').textContent = err.message || 'Registration failed.';
                document.getElementById('alert-error').style.display = 'block';
                setButtonLoading(btn, false);
            }
        });
    </script>
</body>

</html>
