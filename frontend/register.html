<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Register - SaaS Payment</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="css/style.css">
    <script src="js/api.js"></script>
    <script src="js/app.js"></script>
</head>

<body>
    <header>
        <div class="container nav-wrap">
            <a href="index.html" class="logo">SaaSFlow.</a>
        </div>
    </header>

    <main class="auth-wrapper container">
        <div class="auth-card glass-card">
            <h1 class="auth-title">Create an account</h1>
            <p class="auth-subtitle">Start your 7-day free trial</p>

            <div id="alert-error" class="alert alert-error"></div>

            <form id="register-form">
                <div class="form-group">
                    <label for="company" class="form-label">Company Name</label>
                    <input type="text" id="company" class="form-control" placeholder="Acme Corp" required>
                </div>
                <div class="form-group">
                    <label for="email" class="form-label">Email Address</label>
                    <input type="email" id="email" class="form-control" placeholder="you@example.com" required>
                </div>
                <div class="form-group">
                    <label for="password" class="form-label">Password</label>
                    <input type="password" id="password" class="form-control" placeholder="••••••••" required>
                </div>

                <button type="submit" id="btn-submit" class="btn btn-primary btn-block" style="margin-top: 1rem;">Create
                    Account</button>
            </form>

            <div class="auth-footer">
                Already have an account? <a href="login.html">Log in</a>
            </div>
        </div>
    </main>

    <script>
        document.getElementById('register-form').addEventListener('submit', async (e) => {
            e.preventDefault();

            const company = document.getElementById('company').value;
            const email = document.getElementById('email').value;
            const password = document.getElementById('password').value;
            const btn = document.getElementById('btn-submit');

            document.getElementById('alert-error').style.display = 'none';
            setButtonLoading(btn, true, 'Creating account...');

            try {
                // Register
                await window.api.register(email, password, company);

                // Success! Redirect to login page
                window.location.href = 'login.html?registered=true';

            } catch (err) {
                document.getElementById('alert-error').textContent = err.message || 'Registration failed.';
                document.getElementById('alert-error').style.display = 'block';
                setButtonLoading(btn, false);
            }
        });
    </script>
</body>

</html>
