<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Log In - SaaS Payment</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="css/style.css">
    <script src="js/api.js"></script>
    <script src="js/app.js"></script>
</head>

<body>
    <header>
        <div class="container nav-wrap">
            <a href="index.html" class="logo">SaaSFlow.</a>
        </div>
    </header>

    <main class="auth-wrapper container">
        <div class="auth-card glass-card">
            <h1 class="auth-title">Welcome back</h1>
            <p class="auth-subtitle">Log in to your account</p>

            <div id="alert-error" class="alert alert-error"></div>

            <form id="login-form">
                <div class="form-group">
                    <label for="email" class="form-label">Email Address</label>
                    <input type="email" id="email" class="form-control" placeholder="you@example.com" required>
                </div>
                <div class="form-group">
                    <label for="password" class="form-label">Password</label>
                    <input type="password" id="password" class="form-control" placeholder="••••••••" required>
                </div>

                <button type="submit" id="btn-submit" class="btn btn-primary btn-block" style="margin-top: 1rem;">Log
                    In</button>
            </form>

            <div class="auth-footer">
                Don't have an account? <a href="register.html">Sign up</a>
            </div>
        </div>
    </main>

    <script>
        document.getElementById('login-form').addEventListener('submit', async (e) => {
            e.preventDefault();

            const email = document.getElementById('email').value;
            const password = document.getElementById('password').value;
            const btn = document.getElementById('btn-submit');

            document.getElementById('alert-error').style.display = 'none';
            setButtonLoading(btn, true, 'Authenticating...');

            try {
                // Request to backend wrapper wrapper
                const res = await window.api.request('/users/token/', {
                    method: 'POST',
                    body: { email, password },
                    noAuth: true
                });

                localStorage.setItem('access_token', res.access);
                localStorage.setItem('refresh_token', res.refresh);

                // Handle Redirect intent
                const urlParams = new URLSearchParams(window.location.search);
                const redirect = urlParams.get('redirect');
                const checkout = urlParams.get('checkout');

                if (redirect) {
                    let dest = redirect;
                    if (checkout) dest += `?checkout=${checkout}`;
                    window.location.href = dest;
                } else {
                    window.location.href = 'dashboard.html';
                }

            } catch (err) {
                document.getElementById('alert-error').textContent = err.message || 'Invalid credentials. Please try again.';
                document.getElementById('alert-error').style.display = 'block';
                setButtonLoading(btn, false);
            }
        });

        // Show success message if coming from registration
        document.addEventListener('DOMContentLoaded', () => {
            const urlParams = new URLSearchParams(window.location.search);
            if (urlParams.get('registered')) {
                const el = document.getElementById('alert-error');
                if (el) {
                    el.textContent = 'Account created successfully! Please log in.';
                    el.className = 'alert alert-success';
                    el.style.display = 'block';
                }
            }
        });
    </script>
</body>

</html>
